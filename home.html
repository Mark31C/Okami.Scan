<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de Manga</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }
        header {
            position: relative;
            width: 100%;
            height: 300px;
            background: url('tu-imagen-principal.jpg') no-repeat center center/cover;
        }
        nav {
            background-color: #333;
            overflow: hidden;
        }
        nav ul {
            margin: 0;
            padding: 0;
            list-style: none;
            display: flex;
            justify-content: center;
        }
        nav ul li {
            padding: 14px 20px;
        }
        nav ul li a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }
        .search-container {
            padding: 20px;
            text-align: center;
        }
        .search-container input[type="text"] {
            width: 60%;
            padding: 10px;
            font-size: 16px;
        }
        .chapters {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .chapter {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        .chapter img {
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header></header>
    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Capítulos</a></li>
            <li><a href="#">Sobre el autor</a></li>
        </ul>
    </nav>
    <div class="search-container">
        <input type="text" placeholder="Buscar capítulos...">
    </div>
    <div class="chapters">
        <div class="chapter">
            <img src="capitulo1.jpg" alt="Capítulo 1">
            <h3>Capítulo 1</h3>
        </div>
        <div class="chapter">
            <img src="capitulo2.jpg" alt="Capítulo 2">
            <h3>Capítulo 2</h3>
        </div>
        <!-- Añade más capítulos aquí -->
    </div>
</body>
</html>
