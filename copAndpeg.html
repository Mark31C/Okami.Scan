<script type="module">
  // 1. Importamos las herramientas de Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

  // 2. CONFIGURACIÓN DE TU PROYECTO (Sustituye esto con lo que te da Firebase)
  const firebaseConfig = {
    apiKey: "TU_API_KEY_AQUI",
    authDomain: "tu-proyecto.firebaseapp.com",
    projectId: "tu-proyecto-id",
    storageBucket: "tu-proyecto.appspot.com",
    messagingSenderId: "tu-id-emisor",
    appId: "tu-app-id"
  };

  // 3. Inicializamos Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // 4. FUNCIONES PARA QUE LOS BOTONES FUNCIONEN
  
  // Función para mostrar el formulario
  window.mostrarFormulario = (tipo) => {
      document.getElementById('formulario-subida').style.display = 'block';
      document.getElementById('form-title').innerText = tipo === 'manga' ? 'Registrar Nuevo Manga' : 'Subir Nuevo Capítulo';
  };

  // Función para subir a Firebase
  window.ejecutarSubidaFirebase = async () => {
      const nombre = document.getElementById('manga-nombre').value;
      const archivo = document.getElementById('manga-portada').files[0];

      if (!nombre || !archivo) {
          alert("Por favor, llena los campos antes de subir.");
          return;
      }

      try {
          // Subir imagen de portada a Storage
          const storageRef = ref(storage, `portadas/${archivo.name}`);
          const snapshot = await uploadBytes(storageRef, archivo);
          const urlImagen = await getDownloadURL(snapshot.ref);

          // Guardar información en Firestore
          await addDoc(collection(db, "mangas"), {
              titulo: nombre,
              portada: urlImagen,
              fecha: serverTimestamp()
          });

          alert("¡Manga añadido a Okami Scan!");
          location.reload(); 
      } catch (e) {
          console.error("Error: ", e);
          alert("Algo salió mal. Revisa la consola (F12).");
      }
  };
</script>
