<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okami Scan | Oficial</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --naranja: #ff4500; --negro: #0a0a0a; --tarjeta: rgba(20, 20, 20, 0.9); }
        
        body { 
            margin: 0; padding: 0; font-family: 'Poppins', sans-serif; color: #eee;
            background: url('https://images.alphacoders.com/132/1323380.png') no-repeat center center fixed; 
            background-size: cover;
        }

        .overlay { background: rgba(0, 0, 0, 0.7); min-height: 100vh; width: 100%; }

        /* CABECERA */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 30px; background: rgba(0,0,0,0.8); border-bottom: 2px solid var(--naranja);
        }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-img { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--naranja); object-fit: cover; }
        h1 { font-size: 1.5rem; color: var(--naranja); margin: 0; text-transform: uppercase; }

        /* BOTÓN TRES RAYAS */
        .menu-icon { cursor: pointer; display: flex; flex-direction: column; gap: 5px; z-index: 1001; }
        .menu-icon div { width: 30px; height: 4px; background: var(--naranja); border-radius: 2px; transition: 0.3s; }

        /* MENÚ LATERAL (SIDEBAR) */
        #sidebar {
            position: fixed; right: -300px; top: 0; width: 280px; height: 100%;
            background: #111; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            transition: 0.4s; z-index: 1000; padding: 80px 20px 20px;
        }
        #sidebar.active { right: 0; }

        /* ELEMENTOS DEL MENÚ */
        .menu-item { margin-bottom: 25px; }
        label { display: block; color: var(--naranja); font-weight: bold; margin-bottom: 10px; }
        #buscador-manga { 
            width: 90%; padding: 10px; border-radius: 5px; border: 1px solid #444; 
            background: #222; color: white; outline: none;
        }

        /* SECCIÓN OCULTA (SOLO MARIO) */
        .admin-section { 
            margin-top: 40px; padding-top: 20px; border-top: 1px dashed #444; 
            opacity: 0.1; transition: 0.5s; /* Casi invisible hasta que pasas el mouse */
        }
        .admin-section:hover { opacity: 1; }
        .admin-section input { width: 90%; padding: 8px; margin-bottom: 10px; border-radius: 4px; border: none; }
        .btn-subir { width: 100%; background: var(--naranja); color: white; border: none; padding: 10px; cursor: pointer; font-weight: bold; }

        /* CUADRÍCULA DE MANGAS */
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding: 30px; }
        .manga-card { 
            background: var(--tarjeta); border-radius: 8px; overflow: hidden; 
            transition: 0.3s; border: 1px solid #333;
        }
        .manga-card:hover { transform: scale(1.05); border-color: var(--naranja); }
        .manga-card img { width: 100%; height: 230px; object-fit: cover; }
        .manga-info { padding: 10px; text-align: center; }
        .manga-info h4 { margin: 0; font-size: 13px; color: #fff; }
    </style>
</head>
<body>

<div class="overlay">
    <header>
        <div class="logo-area">
            <img class="logo-img" src="https://scontent-bog2-1.xx.fbcdn.net/v/t39.30808-1/588731945_122142902756941938_8823570660178794569_n.jpg?stp=dst-jpg_s200x200_tt6&_nc_cat=105&ccb=1-7&_nc_sid=2d3e12&_nc_ohc=lpiAOLrIW7MQ7kNvwEZzu2t&_nc_oc=Adp8p07AgUPgM45uGZn9YmoT4YPNOnz--nuAZHGwooCIYcgKNDZJQPlsQf2OPp00deI&_nc_zt=24&_nc_ht=scontent-bog2-1.xx&_nc_gid=OURGsgSf3HGHYeTkYpHE2w&_nc_ss=7a3a8&oh=00_Af2O2LISM1ij7XS8B4TcydEK_YrQjIDS9q8qoavjTvDhkw&oe=69D9BF61" alt="Logo">
            <h1>Okami Scan</h1>
        </div>
        <div class="menu-icon" onclick="toggleMenu()">
            <div></div><div></div><div></div>
        </div>
    </header>

    <div id="sidebar">
        <div class="menu-item">
            <label>🔍 BUSCAR PROYECTO</label>
            <input type="text" id="buscador-manga" placeholder="Escribe el nombre...">
        </div>

        <div class="admin-section">
            <label>🛠️ PANEL MAESTRO</label>
            <input type="text" id="titulo-manga" placeholder="Nombre del Manga">
            <input type="text" id="url-portada" placeholder="URL de la Imagen">
            <button class="btn-subir" onclick="subirManga()">PUBLICAR</button>
        </div>
    </div>

    <div id="biblioteca-mangas" class="manga-grid"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- CONFIGURA TUS DATOS AQUÍ ---
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_DOMINIO",
        projectId: "TU_PROJECT_ID",
        appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ABRIR/CERRAR MENÚ
    window.toggleMenu = () => {
        document.getElementById('sidebar').classList.toggle('active');
    };

    // SUBIR MANGA
    window.subirManga = async () => {
        const t = document.getElementById('titulo-manga').value;
        const p = document.getElementById('url-portada').value;
        if(!t) return alert("Falta el título");
        await addDoc(collection(db, "mangas"), { titulo: t, portada: p, fecha: serverTimestamp() });
        alert("¡Listo Mario! Subido.");
    };

    // CARGAR MANGAS
    const q = query(collection(db, "mangas"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        const grid = document.getElementById('biblioteca-mangas');
        grid.innerHTML = "";
        snapshot.forEach(doc => {
            const m = doc.data();
            grid.innerHTML += `
                <div class="manga-card">
                    <img src="${m.portada || 'https://via.placeholder.com/160x230'}">
                    <div class="manga-info"><h4>${m.titulo}</h4></div>
                </div>`;
        });
    });

    // BUSCADOR
    document.getElementById('buscador-manga').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.manga-card').forEach(card => {
            card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
        });
    });
</script>

</body>
</html>
