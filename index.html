<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okami Scan</title>
<style>
body {font-family: Arial; background:#111; color:white; margin:0;}
header {background:#000; padding:15px; text-align:center;}
.container {display:flex; flex-wrap:wrap; justify-content:center;}
.manga {background:#222; margin:10px; padding:10px; width:200px; border-radius:10px;}
.manga img {width:100%;}
a {color:#00ffcc; text-decoration:none;}
.chapter-list {display:none;}
.viewer {display:none; text-align:center;}
.viewer img {width:100%; max-width:800px;}
button {margin:10px; padding:10px;}
</style>
</head>
<body>

<header>
<h1>🐺 Okami Scan</h1>
<p>Lee tus mangas favoritos</p>
</header>

<div id="home" class="container">
<div class="manga" onclick="openManga('manga1')">
<img src="https://via.placeholder.com/200x300">
<h3>Manga 1</h3>
</div>
</div>

<div id="manga1" class="chapter-list">
<h2 style="text-align:center">Manga 1</h2>
<p style="text-align:center"><a href="#" onclick="openChapter(['https://via.placeholder.com/800x1200','https://via.placeholder.com/800x1200'])">Capítulo 1</a></p>
<button onclick="goHome()">⬅ Volver</button>
</div>

<div id="viewer" class="viewer">
<div id="pages"></div>
<button onclick="goHome()">⬅ Volver al inicio</button>
</div>

<script>
function openManga(id){
document.getElementById('home').style.display='none';
document.getElementById(id).style.display='block';
}

function goHome(){
location.reload();
}

function openChapter(images){
document.querySelectorAll('.chapter-list').forEach(el=>el.style.display='none');
document.getElementById('viewer').style.display='block';
let container=document.getElementById('pages');
container.innerHTML='';
images.forEach(img=>{
let image=document.createElement('img');
image.src=img;
container.appendChild(image);
});
}
</script>

</body>
</html>
