<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okami Scan | Biblioteca Manga</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --naranja: #ff4500; --fondo: #0a0a0a; --tarjeta: #161616; --texto: #eee; }
        body { background: var(--fondo); color: var(--texto); font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        
        header { background: #111; padding: 40px 20px; text-align: center; border-bottom: 3px solid var(--naranja); }
        h1 { margin: 0; font-size: 2.5rem; color: var(--naranja); text-transform: uppercase; letter-spacing: 3px; }

        /* Buscador */
        .search-container { margin: -25px auto 30px; max-width: 600px; padding: 0 20px; }
        #buscador-manga { 
            width: 100%; padding: 15px 25px; border-radius: 50px; border: 2px solid var(--naranja); 
            background: #1a1a1a; color: white; font-size: 16px; outline: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Panel Admin */
        .admin-box { background: var(--tarjeta); border: 1px dashed var(--naranja); margin: 20px auto; max-width: 800px; padding: 20px; border-radius: 10px; }
        .btn { background: var(--naranja); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.3s; }
        .btn:hover { background: #ff6a00; transform: scale(1.05); }
        input[type="text"], input[type="file"] { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #222; color: white; }

        /* Galería de Mangas */
        .manga-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 25px; padding: 40px; }
        .manga-card { background: var(--tarjeta); border-radius: 10px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .manga-card:hover { transform: translateY(-10px); border-color: var(--naranja); box-shadow: 0 10px 20px rgba(255, 69, 0, 0.2); }
        .manga-card img { width: 100%; height: 260px; object-fit: cover; }
        .manga-info { padding: 15px; text-align: center; }
        .manga-info h4 { margin: 0; font-size: 14px; color: var(--naranja); }
    </style>
</head>
<body>

<header>
    <h1>🐺 Okami Scan</h1>
</header>

<div class="search-container">
    <input type="text" id="buscador-manga" placeholder="🔍 Buscar manga favorito...">
</div>

<div class="admin-box">
    <h3>⚙️ Panel de Control (Solo Mario)</h3>
    <button class="btn" onclick="document.getElementById('form-subida').style.display='block'">➕ Nuevo Manga</button>
    <div id="form-subida" style="display:none;">
        <input type="text" id="titulo-manga" placeholder="Nombre del Manga">
        <input type="text" id="url-portada" placeholder="URL de la imagen (portada)">
        <button class="btn" style="background:#28a745" onclick="subirAMariodb()">🚀 Publicar en Web</button>
    </div>
</div>

<div id="biblioteca-mangas" class="manga-grid">
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- ¡IMPORTANTE! --- 
    // Mario, pega aquí tus credenciales de Firebase entre las llaves { }
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "tu-proyecto.firebaseapp.com",
        projectId: "tu-proyecto-id",
        storageBucket: "tu-proyecto.appspot.com",
        appId: "tu-app-id"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FUNCIÓN PARA SUBIR
    window.subirAMariodb = async () => {
        const titulo = document.getElementById('titulo-manga').value;
        const portada = document.getElementById('url-portada').value;
        if(!titulo) return alert("Ponle un nombre al manga");

        try {
            await addDoc(collection(db, "mangas"), {
                titulo: titulo,
                portada: portada || 'https://via.placeholder.com/180x260?text=Okami+Scan',
                fecha: serverTimestamp()
            });
            alert("¡Manga añadido a la lista!");
            document.getElementById('titulo-manga').value = "";
            document.getElementById('url-portada').value = "";
        } catch (e) { alert("Error: " + e.message); }
    };

    // MOSTRAR MANGAS EN TIEMPO REAL
    const q = query(collection(db, "mangas"), orderBy("fecha", "desc"));
    onSnapshot(q, (snapshot) => {
        const biblioteca = document.getElementById('biblioteca-mangas');
        biblioteca.innerHTML = "";
        snapshot.forEach((doc) => {
            const m = doc.data();
            biblioteca.innerHTML += `
                <div class="manga-card">
                    <img src="${m.portada}" alt="Portada">
                    <div class="manga-info">
                        <h4>${m.titulo}</h4>
                    </div>
                </div>
            `;
        });
    });

    // BUSCADOR EN VIVO
    document.getElementById('buscador-manga').addEventListener('input', (e) => {
        const texto = e.target.value.toLowerCase();
        document.querySelectorAll('.manga-card').forEach(card => {
            const titulo = card.querySelector('h4').innerText.toLowerCase();
            card.style.display = titulo.includes(texto) ? "block" : "none";
        });
    });
</script>

</body>
</html>
