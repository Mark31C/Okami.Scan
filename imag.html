<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Okami Scan</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #111;
    color: white;
}

/* HEADER */
header {
    width: 100%;
    height: 250px;
    background: url('https://picsum.photos/1200/400') no-repeat center/cover;
}

/* NAV */
nav {
    background: #000;
}
nav ul {
    display: flex;
    justify-content: center;
    list-style: none;
    margin: 0;
    padding: 0;
}
nav ul li {
    padding: 15px 20px;
}
nav ul li a {
    color: white;
    text-decoration: none;
}

/* BUSCADOR */
.search-container {
    text-align: center;
    padding: 20px;
}
.search-container input {
    padding: 10px;
    width: 60%;
    border: none;
    border-radius: 5px;
}
.search-container button {
    padding: 10px;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* BOTONES */
.upload-section {
    text-align: center;
    margin: 20px;
}
.upload-section input {
    margin: 10px;
}

/* MANGAS */
.manga-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px;
}
.manga {
    background: #222;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}
.manga img {
    width: 100%;
    border-radius: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    background: black;
    margin-top: 20px;
}
</style>

</head>

<body>

<header></header>

<nav>
<ul>
<li><a href="#">Inicio</a></li>
<li><a href="#">Mangas</a></li>
<li><a href="#">Subir</a></li>
</ul>
</nav>

<!-- BUSCADOR -->
<div class="search-container">
<input type="text" id="search" placeholder="Buscar manga...">
<button onclick="buscar()">Buscar</button>
</div>

<!-- SUBIR CONTENIDO -->
<div class="upload-section">
<h2>Subir Manga</h2>

<input type="text" id="titulo" placeholder="Título del manga"><br>

<input type="file" id="imagen"><br>

<input type="file" id="capitulo" multiple><br>

<button onclick="subirManga()">Subir</button>
</div>

<!-- LISTA -->
<div class="manga-list" id="lista"></div>

<footer>
<p>© 2026 Okami Scan</p>
</footer>

<script>
let mangas = [];

function subirManga() {
    let titulo = document.getElementById("titulo").value;
    let imagenInput = document.getElementById("imagen");

    if (!titulo || !imagenInput.files[0]) {
        alert("Completa los datos");
        return;
    }

    let imagenURL = URL.createObjectURL(imagenInput.files[0]);

    let manga = {
        titulo: titulo,
        imagen: imagenURL
    };

    mangas.push(manga);
    mostrarMangas();
}

function mostrarMangas() {
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    mangas.forEach(m => {
        lista.innerHTML += `
            <div class="manga">
                <img src="${m.imagen}">
                <h3>${m.titulo}</h3>
            </div>
        `;
    });
}

function buscar() {
    let texto = document.getElementById("search").value.toLowerCase();
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    mangas
    .filter(m => m.titulo.toLowerCase().includes(texto))
    .forEach(m => {
        lista.innerHTML += `
            <div class="manga">
                <img src="${m.imagen}">
                <h3>${m.titulo}</h3>
            </div>
        `;
    });
}
</script>

</body>
</html>
